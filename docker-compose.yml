services:
  redis:
    image: redis:7-alpine
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      MAX_QUBITS: ${MAX_QUBITS:-24}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    volumes:
      - ./tests:/app/tests:ro
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build: ./worker
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      NUM_SHOTS: ${NUM_SHOTS:-1024}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-2}
      MAX_TASKS_PER_CHILD: ${MAX_TASKS_PER_CHILD:-10}
      TASK_MAX_RETRIES: ${TASK_MAX_RETRIES:-3}
      RESULT_TTL: ${RESULT_TTL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
